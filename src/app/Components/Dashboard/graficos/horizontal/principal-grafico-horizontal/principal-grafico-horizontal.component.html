<div class="filtro-fechas">
  <div class="campo">
    <label>Fecha inicio</label>
    <input type="date" [(ngModel)]="fechaInicio">
  </div>

  <div class="campo">
    <label>Fecha fin</label>
    <input type="date" [(ngModel)]="fechaFin">
  </div>

  <div class="campo">
  <label>Turno</label>
  <select [(ngModel)]="turnoSeleccionado">
    <option value="">Todos</option>
    <option value="DÍA">Día</option>
    <option value="NOCHE">Noche</option>
  </select>
</div>


  <button class="btn-aplicar" (click)="aplicarFiltro()">
    Aplicar
  </button>

  <button class="btn-aplicar" (click)="quitarFiltro()">
    Quitar filtro
  </button>

  <button class="btn-aplicar" (click)="generarPDF()">
  Exportar PDF
</button>
</div>

<div class="graficos-container">
  <app-resumen class="full-width" [data]="resumen"></app-resumen>
  
  <app-disparos-equipo [data]="dataDisparosEquipo"></app-disparos-equipo>
  <app-disparos-dia [data]="dataDisparosDia"></app-disparos-dia>
  <app-rendimiento-equipo [data]="dataIndicadoresEquipo" ></app-rendimiento-equipo>
  <app-demoras-operativas [data]="dataDemorasOperativas"></app-demoras-operativas>
  <app-horas-no-operativas [data]="dataHorasNoOperativas"></app-horas-no-operativas>
  <app-horas-de-mantenimiento [data]="dataHorasMantenimiento"></app-horas-de-mantenimiento>

  <app-metros-perforados-disparo [data]="dataMetrosDisparoFR"></app-metros-perforados-disparo>
  <app-perforado-equipo  [data]="dataMetrosDisparoFR"></app-perforado-equipo>
  <app-mhr-equipo [data]="dataMhrEquipo"></app-mhr-equipo>
  <app-horometros-jumbos [data]="dataHorometrosJumbos"></app-horometros-jumbos>
  <app-total-horometros [data]="dataHorometrosJumbos"></app-total-horometros>
  <app-horas-primera-perforacion [data]="dataProcesoLaborFR"></app-horas-primera-perforacion>

  <app-avance-fase [data]="dataAvanceFase"></app-avance-fase>
  <app-disparos-tipo-perforacion [data]="dataTipoPerforacion"></app-disparos-tipo-perforacion>
  
  <app-promedio-estados-echarts class="full-width" [data]="datosGraficoEstados" ></app-promedio-estados-echarts>
  
  <app-detalle-perforacion class="full-width" [data]="dataPercusionConMetrosJumbos"></app-detalle-perforacion>
  <app-detalle-disparos class="full-width" [data]="datadetalleDisparos"></app-detalle-disparos>

  <app-mejores-operadores [data]="dataFrPorOperadorTurno"></app-mejores-operadores>
  <app-ranking-operador [data]="dataFrPorOperadorTurno"></app-ranking-operador>
  <app-observaciones class="full-width" [data]="dataLaborFRDetallado"></app-observaciones>

<app-scatter-turnos 
  *ngIf="turnoAplicado === '' || turnoAplicado === 'DÍA'"
  class="full-width"
  [data]="dataHorasNumericas">
</app-scatter-turnos>

<app-scatter-turnos-noche 
  *ngIf="turnoAplicado === '' || turnoAplicado === 'NOCHE'"
  class="full-width"
  [data]="dataHorasNumericas">
</app-scatter-turnos-noche>



</div>
