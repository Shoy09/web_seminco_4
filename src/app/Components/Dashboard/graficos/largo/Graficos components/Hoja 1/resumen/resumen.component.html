<div class="dashboard-container">
  <h2 class="dashboard-title">RESUMEN</h2>
  
  <div class="cards-grid">
    <!-- Tarjeta 1: EQUIPOS FRONTONEROS -->
    <div class="card">
      <div class="card-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
          <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
        </svg>
      </div>
      <div class="card-label">EQUIPOS DE TALADROS LARGOS</div>
      <div class="card-value">{{ resumenData.equiposFrontoneros | number }}</div>
    </div>

    <div class="card">
      <div class="card-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
          <path d="M12 22V12"></path>
          <polyline points="9 10 12 8 15 10"></polyline>
        </svg>
      </div>
      <div class="card-label">Total Perforado</div>
      <div class="card-value">{{ resumenData.totalPerforado | number }}</div>
    </div>

    <div class="card">
      <div class="card-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 3v18h18"></path>
          <path d="M18 17V9"></path>
          <path d="M12 17V5"></path>
          <path d="M6 17v-3"></path>
        </svg>
      </div>
      <div class="card-label">Metros Perforados / Labor</div>
      <div class="card-value">{{ resumenData.metrosPerforadosDisparo | number }}</div>
    </div>

    <!-- Tarjeta 3: TOTAL DE DISPAROS / DÍA -->
    <div class="card">
      <div class="card-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"></circle>
          <polyline points="12 6 12 12 16 14"></polyline>
        </svg>
      </div>
      <div class="card-label">Labores perforadas</div>
      <div class="card-value">{{ resumenData.totalDisparosDia | number }}</div>
    </div>

    
  </div>
</div>
