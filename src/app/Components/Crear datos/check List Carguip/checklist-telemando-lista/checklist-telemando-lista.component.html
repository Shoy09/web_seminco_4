<div class="container">
  <div class="table_header">
    <h2>Checklists de Telemando</h2>
    <button mat-flat-button color="primary" (click)="abrirDialogoCrear()">Crear Nuevo Checklist</button>
    <div class="input_search">
      <input type="search" placeholder="Buscar por nombre" (keyup)="applyFilter($event)" />
      <i class="bi bi-search" id="search"></i>
    </div>
  </div>

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef> ID </th>
      <td mat-cell *matCellDef="let item"> {{ item.id }} </td>
    </ng-container>

    <ng-container matColumnDef="nombre">
      <th mat-header-cell *matHeaderCellDef> Nombre del Checklist </th>
      <td mat-cell *matCellDef="let item"> {{ item.nombre }} </td>
    </ng-container>

    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef> Acciones </th>
      <td mat-cell *matCellDef="let item">
        <i class="bi bi-pencil-square icon-action" (click)="abrirDialogoEditar(item)" title="Editar"></i>
        <i class="bi bi-trash icon-action" (click)="eliminarItem(item.id!)" title="Eliminar"></i>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    <!-- Mensaje cuando no hay datos -->
    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell" [attr.colspan]="displayedColumns.length">
        No hay checklists de telemando disponibles
      </td>
    </tr>
  </table>

  <mat-paginator [pageSize]="10" [pageSizeOptions]="[5, 10, 20, 50]" showFirstLastButtons></mat-paginator>
</div>
