  <app-card-operaciones

    [data]="cardData">

  <div class="tabla-container">
    <app-tabla *ngIf="!loading" [data]="tablaData"></app-tabla>

  <app-menuAcciones
  [horometrosData]="horometrosData"
  [condicionesData]="condicionesData"
  [checkListData]="checkListData"
  [llantasData]="llantasData">
</app-menuAcciones>


</div>
