<div class="modal-overlay" *ngIf="visible">
  <div class="modal-card op-card">
    
    <h2 class="title">REGISTRAR OPERACIÓN</h2>
    <p class="subtitle">Última hora: 07:00</p>

    <div class="status-info">
      <i class="fas fa-info-circle"></i>
      <span>Estado: {{ estadoSeleccionado }}</span>
    </div>

    <form class="form-container">

      <!-- 🔥 CÓDIGO DINÁMICO -->
      <div class="input-group">
        <select 
          class="custom-select" 
          name="codigo" 
          [(ngModel)]="codigoSeleccionado" 
          required>

          <option value="" disabled>Código (*)</option>

          <option *ngFor="let c of codigos" [value]="c">
            {{ c }}
          </option>

        </select>
        <i class="fas fa-caret-down select-arrow"></i>
      </div>

      <!-- 🔥 HORA INICIO -->
      <div class="input-group has-label">
        <label class="floating-label">Hora Inicio (*)</label>
        <select 
  class="custom-select"
  name="horaInicio"
  [(ngModel)]="horaInicioSeleccionado">

  <option value="">Seleccione > 07:00</option>

  <option *ngFor="let h of horas" [value]="h">
    {{ h }}
  </option>

</select>
        <i class="fas fa-caret-down select-arrow"></i>
      </div>
      
      <p class="helper-text">
        <i class="far fa-clock"></i> Solo horas posteriores a 07:00
      </p>

      <!-- 🔥 BOTONES -->
      <div class="button-group">
        
        <button 
          type="button" 
          class="btn-outline" 
          (click)="cerrarFormOperacion()">
          Limpiar
        </button>
        
        <button 
          type="button" 
          class="btn-fill" 
          [disabled]="!codigoSeleccionado"
          (click)="confirmarOperacion()">
          Crear
        </button>

      </div>

    </form>

    <p class="footer-note">(*) Los campos con asterisco son obligatorios.</p>
  </div>
</div>
