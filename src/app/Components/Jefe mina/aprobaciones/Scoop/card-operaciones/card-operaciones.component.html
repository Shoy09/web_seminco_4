<!-- card-operaciones.component.html -->
<div class="form-container">
  <div class="form-row">

    <!-- Fecha — fijo -->
    <fieldset class="field">
      <legend>Fecha</legend>
      <div class="input-inner">
        <input type="date" [(ngModel)]="formValues['fecha']">
        <span class="icon-gray"></span>
      </div> 
    </fieldset>

    <!-- Turno -->
    <fieldset class="field">
      <legend>Turno</legend>
      <div class="input-inner">
        <span class="icon-color">🕒</span>
        <select [(ngModel)]="formValues['turno']">
          <option *ngFor="let opt of getCampo('turno').options" [value]="opt">{{ opt }}</option>
        </select>
      </div>
    </fieldset>

    <!-- Equipo -->
    <fieldset class="field">
      <legend>Equipo</legend>
      <div class="input-inner">
        <span class="icon-color">🚜</span>
        <select [(ngModel)]="formValues['equipo']">
          <option *ngFor="let opt of getCampo('equipo').options" [value]="opt">{{ opt }}</option>
        </select>
      </div>
    </fieldset>

    <!-- Código -->
    <fieldset class="field">
      <legend>Código</legend>
      <div class="input-inner">
        <span class="icon-color">🔢</span>
        <select [(ngModel)]="formValues['codigo']">
          <option *ngFor="let opt of getCampo('codigo').options" [value]="opt">{{ opt }}</option>
        </select>
      </div>
    </fieldset>

    <!-- Tipo de equipo — fijo aquí -->
    <fieldset class="field checks-box">
      <legend>Tipo de equipo</legend>
      <div class="checks-group">
        <label class="check-item" *ngFor="let tipo of tiposEquipo">
          <input type="checkbox" [(ngModel)]="formValues['tiposEquipo'][tipo.value]">
          {{ tipo.label }}
        </label>
      </div>
    </fieldset>


<!-- Operador -->
<fieldset class="field">
  <legend>Operador</legend>
  <div class="input-inner">
    <input type="text" placeholder="6666 6666" [(ngModel)]="formValues['operador']">
    <span class="icon-gray">👤</span>
  </div>
</fieldset>

    <!-- Jefe Guardia -->
    <fieldset class="field">
      <legend>Jefe Guardia</legend>
      <div class="input-inner">
        <span class="icon-color">👤</span>
        <select [(ngModel)]="formValues['jefeGuardia']">
          <option *ngFor="let opt of getCampo('jefeGuardia').options" [value]="opt">{{ opt }}</option>
        </select>
      </div>
    </fieldset>

    <!-- Sección -->
    <fieldset class="field">
      <legend>Sección</legend>
      <div class="input-inner">
        <span class="icon-color">🗺️</span>
        <select [(ngModel)]="formValues['seccion']">
          <option *ngFor="let opt of getCampo('seccion').options" [value]="opt">{{ opt }}</option>
        </select>
      </div>
    </fieldset>

  </div>

</div>
