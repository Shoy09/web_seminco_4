<h2 mat-dialog-title>Confirmar revisión</h2>

<mat-dialog-content>
  <p>¿Cuál es el resultado de esta revisión?</p>

  <mat-radio-group [(ngModel)]="estado">
    <mat-radio-button [value]="1">✅ Aceptado</mat-radio-button><br>
    <mat-radio-button [value]="2">❌ Rechazado</mat-radio-button>
  </mat-radio-group>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancelar()">Cancelar</button>
  <button mat-raised-button color="primary" (click)="confirmar()">
    Confirmar
  </button>
</mat-dialog-actions>
