<div class="modal-overlay perf-overlay" *ngIf="visible">
  <div class="modal-card perf-card">
    <div class="perf-header">
      <div class="header-left">
        <i class="far fa-file-alt header-icon"></i>
        <h1 class="header-title">Formulario de Perforación</h1>
      </div>
      <div class="header-right">
        <span class="editable-badge">• EDITABLE</span>
      </div>
    </div>

    <div class="validation-error" *ngIf="formularioInvalido">
      <i class="fas fa-exclamation-triangle"></i>
      Complete los campos obligatorios de Ubicación (*).
    </div>

    <form class="perf-form">
      <fieldset class="form-section">
        <legend class="section-legend">
          <i class="fas fa-map-marker-alt icon"></i> Ubicación
        </legend>
        <div class="row-inputs">
          <div class="input-field">
            <label class="field-label">
              <i class="fas fa-layer-group label-icon"></i>
              Nivel <span class="required-star">*</span>
            </label>
            <select
              class="perf-select"
              [(ngModel)]="datosPerforacion.ubicacion.nivel"
              name="nivel"
            >
              <option value="" disabled>Seleccionar nivel</option>
              <option *ngFor="let n of niveles" [value]="n">{{ n }}</option>
            </select>
          </div>
          
          <div class="input-field">
            <label class="field-label">
              <i class="fas fa-screwdriver-wrench label-icon"></i>
              Tipo Labor <span class="required-star">*</span>
            </label>
            <select
              class="perf-select"
              [(ngModel)]="datosPerforacion.ubicacion.tipoLabor"
              name="tipoLabor"
            >
              <option value="" disabled>Seleccionar tipo labor</option>
              <option *ngFor="let t of tiposLabor" [value]="t">{{ t }}</option>
            </select>
          </div>
          
          <div class="input-field">
            <label class="field-label">
              <i class="fas fa-warehouse label-icon"></i>
              Labor <span class="required-star">*</span>
            </label>
            <select
              class="perf-select"
              [(ngModel)]="datosPerforacion.ubicacion.labor"
              name="labor"
            >
              <option value="" disabled>Seleccionar labor</option>
              <option *ngFor="let l of labores" [value]="l">{{ l }}</option>
            </select>
          </div>
          
          <div class="input-field">
            <label class="field-label">
              <i class="fas fa-code-branch label-icon"></i>
              Ala
            </label>
            <select
              class="perf-select"
              [(ngModel)]="datosPerforacion.ubicacion.ala"
              name="ala"
            >
              <option value="">Seleccionar ala (opcional)</option>
              <option *ngFor="let a of alas" [value]="a">{{ a }}</option>
            </select>
          </div>
        </div>
      </fieldset>

      <fieldset class="form-section">
        <legend class="section-legend">
          <i class="fas fa-tools icon"></i> Pernos
        </legend>

        <div class="row-inputs three-cols">
          <div class="input-field">
            <label class="field-label">
              <i class="fas fa-bolt label-icon"></i>
              Tipo Pernos
            </label>
            <input
              type="text"
              class="perf-input"
              placeholder="Ej: Split Set, Swellex"
              [(ngModel)]="datosPerforacion.pernos.tipo"
              name="tipoPerno"
            />
          </div>

          <div class="input-field">
            <label class="field-label">
              <i class="fas fa-chart-line label-icon"></i>
              Log Pernos
            </label>
            <input
              type="text"
              class="perf-input"
              placeholder="Ingrese log de pernos"
              [(ngModel)]="datosPerforacion.pernos.log"
              name="logPerno"
            />
          </div>

          <div class="input-field">
            <label class="field-label">
              <i class="fas fa-hashtag label-icon"></i>
              N° Pernos Instalados
            </label>
            <input
              type="number"
              class="perf-input"
              placeholder="0"
              [(ngModel)]="datosPerforacion.pernos.nInstalados"
              name="nInstalados"
            />
          </div>
        </div>
      </fieldset>

      <fieldset class="form-section">
        <legend class="section-legend">
          <i class="fas fa-border-all icon"></i> Malla y Sistemático
        </legend>

        <div class="row-inputs three-cols">
          <div class="input-field">
            <label class="field-label">
              <i class="fas fa-th label-icon"></i>
              Tipo Malla
            </label>
            <input type="text"
              class="perf-input"
              placeholder="Ej: Cuadrada, Rectangular"
              [(ngModel)]="datosPerforacion.malla.tipo"
              name="tipoMalla">
          </div>

          <div class="input-field">
            <label class="field-label">
              <i class="fas fa-ruler-combined label-icon"></i>
              MTS² Malla
            </label>
            <input type="text"
              class="perf-input"
              placeholder="Ej: 1.5 x 1.5"
              [(ngModel)]="datosPerforacion.malla.mts2"
              name="mts2Malla">
          </div>

          <div class="input-field">
            <label class="field-label">
              <i class="fas fa-draw-polygon label-icon"></i>
              Sistemático / Puntual
            </label>
            <input type="text"
              class="perf-input"
              placeholder="Sistemático o Puntual"
              [(ngModel)]="datosPerforacion.malla.sistematicoPuntual"
              name="sistematico">
          </div>
        </div>
      </fieldset>

      <fieldset class="form-section">
        <legend class="section-legend">
          <i class="fas fa-comment icon"></i> Observaciones
        </legend>

        <div class="input-field textarea-field">
          <label class="field-label">
            <i class="fas fa-pen label-icon"></i>
            Observaciones adicionales
          </label>
          <textarea
            class="perf-input perf-textarea"
            rows="3"
            placeholder="Ingrese observaciones importantes sobre la perforación..."
            [(ngModel)]="datosPerforacion.observaciones"
            name="observaciones"
          ></textarea>
        </div>
      </fieldset>

      <div class="perf-footer-actions">
        <button
          type="button"
          class="btn-cancelar"
          (click)="cerrarFormPerforacion()"
        >
          <i class="fas fa-times"></i> Cancelar
        </button>
        <button
          type="button"
          class="btn-guardar"
          (click)="guardarPerforacion()"
        >
          <i class="fas fa-save"></i> Guardar cambios
        </button>
      </div>
    </form>
  </div>
</div>
