<div class="modal-overlay perf-overlay" *ngIf="visible">
  <div class="modal-card perf-card">
    <div class="perf-header">
      <div class="header-left">
        <i class="far fa-file-alt header-icon"></i>
        <h1 class="header-title">Formulario de Perforación</h1>
      </div>

      <div class="header-right">
        <span class="editable-badge">• EDITABLE</span>

        <span class="estado-badge" [class]="estado.toLowerCase()">
          {{ estado }}
        </span>
      </div>
    </div>

    <form class="perf-form">

      <!-- UBICACIÓN -->
      <fieldset class="form-section">
        <legend class="section-legend">
          <i class="fas fa-location-dot icon"></i>
          Ubicación
        </legend>

        <div class="row-inputs">

          <!-- NIVEL -->
          <div class="input-field">
            <label class="field-label">
              <i class="fas fa-layer-group label-icon"></i>
              Nivel
            </label>

            <input
              type="text"
              class="perf-input"
              placeholder="Ej: 4500"
              [(ngModel)]="datosPerforacion.nivel"
              name="nivel"
            />
          </div>

          <!-- TIPO LABOR -->
          <div class="input-field">
            <label class="field-label">
              <i class="fas fa-screwdriver-wrench label-icon"></i>
              Tipo Labor
            </label>

            <input
              type="text"
              class="perf-input"
              placeholder="Ej: SN"
              [(ngModel)]="datosPerforacion.tipoLabor"
              name="tipoLabor"
            />
          </div>

          <!-- LABOR -->
          <div class="input-field">
            <label class="field-label">
              <i class="fas fa-warehouse label-icon"></i>
              Labor
            </label>

            <input
              type="text"
              class="perf-input"
              placeholder="Ej: 422"
              [(ngModel)]="datosPerforacion.labor"
              name="labor"
            />
          </div>

          <!-- ALA -->
          <div class="input-field">
            <label class="field-label">
              <i class="fas fa-code-branch label-icon"></i>
              Ala
            </label>

            <input
              type="text"
              class="perf-input"
              placeholder="Ej: 3-FN"
              [(ngModel)]="datosPerforacion.ala"
              name="ala"
            />
          </div>

        </div>
      </fieldset>

      <!-- OBSERVACIONES -->
      <fieldset class="form-section">
        <legend class="section-legend">
          <i class="fas fa-comment icon"></i>
          Observaciones
        </legend>

        <div class="input-field textarea-field">
          <label class="field-label">
            <i class="fas fa-pen label-icon"></i>
            Observaciones adicionales
          </label>

          <textarea
            class="perf-input perf-textarea"
            rows="3"
            placeholder="Ingrese observaciones importantes..."
            [(ngModel)]="datosPerforacion.observaciones"
            name="observaciones"
          ></textarea>
        </div>
      </fieldset>

      <!-- BOTONES -->
      <div class="perf-footer-actions">

        <button
          type="button"
          class="btn-cancelar"
          (click)="cerrarFormPerforacion()"
        >
          <i class="fas fa-times"></i>
          Cancelar
        </button>

        <button
          type="button"
          class="btn-guardar"
          (click)="guardarPerforacion()"
        >
          <i class="fas fa-save"></i>
          Guardar cambios
        </button>

      </div>

    </form>
  </div>
</div>
