<div class="modal-overlay perf-overlay" *ngIf="visible">
  <div class="modal-card perf-card">
    <div class="perf-header">
      <div class="header-left">
        <i class="far fa-file-alt header-icon"></i>
        <h1 class="header-title">Formulario de Perforación</h1>
      </div>
      <div class="header-right">
        <span class="editable-badge">• EDITABLE</span>
        <span class="estado-badge" [class]="estado.toLowerCase()" *ngIf="estado">
          {{ estado }}
        </span>
      </div>
    </div>

    <div class="validation-error" *ngIf="formularioInvalido">
      <i class="fas fa-exclamation-triangle"></i>
      Complete los campos obligatorios de Ubicación (*).
    </div>

    <form class="perf-form">
      <!-- SECCIÓN UBICACIÓN (siempre visible) -->
      <fieldset class="form-section">
        <legend class="section-legend">
          <i class="fas fa-map-marker-alt icon"></i> Ubicación
        </legend>
        <div class="row-inputs">
          <div class="input-field">
            <label class="field-label">
              <i class="fas fa-layer-group label-icon"></i>
              Nivel <span class="required-star">*</span>
            </label>
            <input
              type="text"
              class="perf-input"
              placeholder="Ej: 450"
              [(ngModel)]="datosPerforacion.ubicacion.nivel"
              name="nivel"
            />
          </div>
          
          <div class="input-field">
            <label class="field-label">
              <i class="fas fa-screwdriver-wrench label-icon"></i>
              Tipo Labor <span class="required-star">*</span>
            </label>
            <input
              type="text"
              class="perf-input"
              placeholder="Ej: RAMPA, GALERIA, etc."
              [(ngModel)]="datosPerforacion.ubicacion.tipoLabor"
              name="tipoLabor"
            />
          </div>
          
          <div class="input-field">
            <label class="field-label">
              <i class="fas fa-warehouse label-icon"></i>
              Labor <span class="required-star">*</span>
            </label>
            <input
              type="text"
              class="perf-input"
              placeholder="Nombre de la labor"
              [(ngModel)]="datosPerforacion.ubicacion.labor"
              name="labor"
            />
          </div>
          
          <div class="input-field">
            <label class="field-label">
              <i class="fas fa-code-branch label-icon"></i>
              Ala
            </label>
            <input
              type="text"
              class="perf-input"
              placeholder="Ej: NORTE, SUR, etc. (opcional)"
              [(ngModel)]="datosPerforacion.ubicacion.ala"
              name="ala"
            />
          </div>
        </div>
      </fieldset>

      <!-- SECCIÓN TALADROS (solo OPERATIVO) -->
      <fieldset class="form-section" *ngIf="mostrarCamposCompletos">
        <legend class="section-legend">
          <i class="fas fa-gripfire icon"></i> Taladros
        </legend>
        <div class="row-inputs four-cols">
          <div class="input-field">
            <label class="field-label">
              <i class="fas fa-chart-line label-icon"></i>
              Taladros Producción
            </label>
            <input
              type="text"
              class="perf-input"
              placeholder="N° taladros producción"
              [(ngModel)]="datosPerforacion.taladros.produccion"
              name="talProduccion"
            />
          </div>

          <div class="input-field">
            <label class="field-label">
              <i class="fas fa-chart-line label-icon"></i>
              Taladros Rimados
            </label>
            <input
              type="text"
              class="perf-input"
              placeholder="N° taladros rimados"
              [(ngModel)]="datosPerforacion.taladros.rimados"
              name="talRimados"
            />
          </div>

          <div class="input-field">
            <label class="field-label">
              <i class="fas fa-chart-line label-icon"></i>
              Taladros Alivio
            </label>
            <input
              type="text"
              class="perf-input"
              placeholder="N° taladros alivio"
              [(ngModel)]="datosPerforacion.taladros.alivio"
              name="talAlivio"
            />
          </div>

          <div class="input-field">
            <label class="field-label">
              <i class="fas fa-chart-line label-icon"></i>
              Taladros Repaso
            </label>
            <input
              type="text"
              class="perf-input"
              placeholder="N° taladros repaso"
              [(ngModel)]="datosPerforacion.taladros.repaso"
              name="talRepaso"
            />
          </div>
        </div>
      </fieldset>

      <!-- SECCIÓN BARRAS (solo OPERATIVO) -->
      <fieldset class="form-section" *ngIf="mostrarCamposCompletos">
        <legend class="section-legend">
          <i class="fas fa-chart-simple icon"></i> Barras
        </legend>
        <div class="row-inputs two-cols">
          <div class="input-field">
            <label class="field-label">
              <i class="fas fa-ruler label-icon"></i>
              Longitud de Barras (m)
            </label>
            <input
              type="text"
              class="perf-input"
              placeholder="Ej: 5.0"
              [(ngModel)]="datosPerforacion.barras.longitud"
              name="longBarras"
            />
          </div>

          <div class="input-field">
            <label class="field-label">
              <i class="fas fa-hashtag label-icon"></i>
              Número de Barras
            </label>
            <input
              type="text"
              class="perf-input"
              placeholder="Ej: 10"
              [(ngModel)]="datosPerforacion.barras.nBarra"
              name="numBarras"
            />
          </div>
        </div>
      </fieldset>

      <!-- SECCIÓN TIPO PERFORACIÓN (solo OPERATIVO) -->
      <fieldset class="form-section" *ngIf="mostrarCamposCompletos">
        <legend class="section-legend">
          <i class="fas fa-drill icon"></i> Tipo de Perforación
        </legend>
        <div class="row-inputs">
          <div class="input-field">
            <label class="field-label">
              <i class="fas fa-hard-hat label-icon"></i>
              Tipo Perforación
            </label>
            <select
              class="perf-select"
              [(ngModel)]="datosPerforacion.tipoPerforacion"
              name="tipoPerforacion"
            >
              <option value="" disabled>Seleccionar tipo de perforación</option>
              <option *ngFor="let tp of tiposPerforacion" [value]="tp">{{ tp }}</option>
            </select>
          </div>
        </div>
      </fieldset>

      <!-- SECCIÓN OBSERVACIONES (siempre visible) -->
      <fieldset class="form-section">
        <legend class="section-legend">
          <i class="fas fa-comment icon"></i> Observaciones
        </legend>
        <div class="input-field textarea-field">
          <label class="field-label">
            <i class="fas fa-pen label-icon"></i>
            Observaciones adicionales
          </label>
          <textarea
            class="perf-input perf-textarea"
            rows="3"
            placeholder="Ingrese observaciones importantes sobre la perforación..."
            [(ngModel)]="datosPerforacion.observaciones"
            name="observaciones"
          ></textarea>
        </div>
      </fieldset>

      <!-- BOTONES -->
      <div class="perf-footer-actions">
        <button
          type="button"
          class="btn-cancelar"
          (click)="cerrarFormPerforacion()"
        >
          <i class="fas fa-times"></i> Cancelar
        </button>
        <button
          type="button"
          class="btn-guardar"
          (click)="guardarPerforacion()"
        >
          <i class="fas fa-save"></i> Guardar cambios
        </button>
      </div>
    </form>
  </div>
</div>
